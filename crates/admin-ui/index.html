<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Crabbase Admin Console</title>

        <!-- Premium Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"

        <link data-trunk rel="tailwind-css" href="src/input.css" />

        <style>
            body {
                font-family:
                    "Google Sans Code",
                    "Inter",
                    -apple-system,

            h1,
            h2,
            h3,
            h4,
            .font-heading {

            }
